<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1008" />
    <meta name="description" content="Africa Tech Votes — 5 on-chain polls about tech & crypto in Africa, built on Stacks." />
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="Africa Tech Votes — On-Chain Polls" />
    <meta property="og:description" content="5 on-chain polls about tech & crypto in Africa, built on Stacks. Cast your vote today!" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <title>Africa Tech Votes — On-Chain Polls</title>
  </head>
  <body>
    <noscript>
      <div style="background-color: #1a1008; color: #f0e6d3; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif;">
        You need to enable JavaScript to run this on-chain voting app.
      </div>
    </noscript>
    <div id="root">
      <div style="min-height: 100vh; background-color: #1a1008; display: flex; align-items: center; justify-content: center;">
        <style>
          .init-spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(232, 184, 75, 0.15);
            border-bottom-color: #e8b84b;
            border-radius: 50%;
            animation: init-spin 0.8s linear infinite;
          }
          @keyframes init-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        </style>
        <div class="init-spinner"></div>
      </div>
    </div>
  </body>
</html>
